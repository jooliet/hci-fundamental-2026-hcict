<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HCI Fundamentals — Student Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F8F7F3;
  --surface: #FFFFFF;
  --text: #1C1C1A;
  --muted: #6A6A65;
  --border: #E4E3DE;
  --accent: #C4451A;
  --accent-light: #FDF0EB;
  --session-color: #1B7A6E;
  --session-light: #E8F5F2;
  --session-border: #B0DAD5;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; }
a { color: var(--session-color); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── TOPBAR ── */
#topbar {
  background: #1C1C1A;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
#topbar-inner {
  max-width: 960px; margin: 0 auto;
  padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
#topbar-left {}
#topbar-label { font-size: 10px; letter-spacing: 3px; color: #888; text-transform: uppercase; font-family: monospace; margin-bottom: 4px; }
#topbar-title { font-family: 'Lora', serif; font-size: 17px; color: #F5F4F0; font-weight: 400; }
#topbar-title strong { color: #F5F4F0; font-weight: 600; }
#topbar-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ctrl-group { display: flex; border-radius: 7px; overflow: hidden; border: 1px solid #383836; }
.ctrl-btn {
  padding: 6px 14px; font-size: 11px; font-family: monospace;
  letter-spacing: 1px; text-transform: uppercase;
  background: transparent; color: #888; border: none; cursor: pointer;
  transition: all 0.15s;
}
.ctrl-btn.active { background: var(--session-color); color: #fff; }
.ctrl-btn:hover:not(.active) { background: #2A2A28; color: #CCC; }

/* ── LAYOUT ── */
#shell { max-width: 960px; margin: 0 auto; padding: 0 20px 60px; }

/* ── SESSION TABS ── */
#session-tabs {
  display: flex; gap: 4px; padding: 20px 0 0;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
#session-tabs::-webkit-scrollbar { display: none; }
.s-tab {
  padding: 9px 16px; border: none; background: transparent;
  font-family: 'Source Sans 3', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 0.5px;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.15s; border-radius: 6px 6px 0 0;
}
.s-tab:hover:not(.active) { background: var(--border); color: var(--text); }
.s-tab.active { color: var(--session-color); border-bottom-color: var(--session-color); background: var(--session-light); }
.s-tab.exam.active { color: #6B3FAF; border-bottom-color: #6B3FAF; background: #F3EEFF; }

/* ── SESSION HEADER ── */
#session-header {
  border-radius: var(--radius); padding: 24px 28px;
  background: var(--session-light); border: 1px solid var(--session-border);
  margin-bottom: 24px; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start;
}
#s-meta { font-size: 11px; font-family: monospace; letter-spacing: 2px; text-transform: uppercase; color: var(--session-color); margin-bottom: 6px; }
#s-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
#s-subtitle { font-family: 'Lora', serif; font-size: 14px; font-style: italic; color: var(--muted); margin-bottom: 14px; }
#s-date { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
#s-date::before { content: "📅"; font-size: 11px; }
#s-icon { font-size: 52px; opacity: 0.2; color: var(--session-color); font-family: monospace; line-height: 1; }

/* ── SECTION LABELS ── */
.section-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  font-family: monospace; color: var(--muted); margin-bottom: 10px; margin-top: 24px;
}

/* ── INSTRUCTOR: PREP CARD ── */
.prep-card {
  background: #FFFBF0; border: 1px solid #F0E0B0; border-left: 4px solid #D4A020;
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px;
}
.prep-card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; color: #B07820; margin-bottom: 6px; }
.prep-card p { font-size: 14px; color: #444; line-height: 1.7; }

/* ── INSTRUCTOR: TIMING BLOCKS ── */
.block-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); transition: box-shadow 0.2s;
}
.block.open { box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 2px var(--session-border); }
.block-head {
  padding: 14px 18px; cursor: pointer;
  display: grid; grid-template-columns: 70px 90px 1fr auto;
  align-items: center; gap: 12px;
}
.block-time { font-family: monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
.block-badge {
  font-size: 10px; font-family: monospace; padding: 3px 8px;
  border-radius: 4px; white-space: nowrap; text-align: center;
}
.badge-warmup   { background: #FFF3E0; color: #E65100; border: 1px solid #FFCC80; }
.badge-core     { background: #E3F2FD; color: #1565C0; border: 1px solid #90CAF9; }
.badge-activity { background: #F3E5F5; color: #6A1B9A; border: 1px solid #CE93D8; }
.badge-closing  { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
.badge-social   { background: #FCE4EC; color: #880E4F; border: 1px solid #F48FB1; }
.badge-exam     { background: #EDE7F6; color: #4527A0; border: 1px solid #B39DDB; }
.block-title-wrap {}
.block-title { font-size: 14px; font-weight: 600; color: var(--text); }
.block-tag { font-size: 11px; color: var(--session-color); font-family: monospace; margin-top: 1px; }
.block-chev { color: #CCC; font-size: 18px; transition: transform 0.2s; user-select: none; }
.block-chev.open { transform: rotate(90deg); }
.block-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.block-body.open { display: block; }
.block-body p { font-size: 14px; line-height: 1.75; color: #333; margin-top: 14px; margin-bottom: 0; }
.why-box {
  margin-top: 12px; padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  background: var(--session-light); border-left: 3px solid var(--session-color);
  font-size: 12px; color: #555; font-style: italic; line-height: 1.6;
}
.why-box strong { font-style: normal; color: var(--session-color); }
.prompts-box { margin-top: 10px; }
.prompts-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; color: var(--muted); margin-bottom: 6px; }
.prompt-item {
  font-size: 13px; color: #444; padding: 6px 12px;
  background: #F8F7F3; border-radius: 6px; margin-bottom: 4px;
  border-left: 2px solid #DDD;
}
.prompt-item::before { content: "💬 "; }

/* ── INSTRUCTOR: RUBRIC ── */
.rubric-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-top: 8px;
}
.rubric-head {
  padding: 12px 16px; background: var(--session-light);
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
}
.rubric-head-title { font-size: 13px; font-weight: 600; color: var(--session-color); }
.rubric-body { display: none; padding: 14px 16px; }
.rubric-body.open { display: block; }
.rubric-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rubric-table th { text-align: left; padding: 8px 10px; background: var(--bg); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: monospace; color: var(--muted); }
.rubric-table td { padding: 8px 10px; border-top: 1px solid var(--border); vertical-align: top; }
.rubric-table tr:hover td { background: var(--bg); }

/* ── STUDENT: OVERVIEW ── */
.student-overview {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 22px; margin-bottom: 16px;
}
.student-overview p { font-size: 15px; line-height: 1.75; color: #333; }

/* ── STUDENT: WHAT WE DO ── */
.what-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.what-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 16px; font-size: 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.what-item::before { content: "→"; color: var(--session-color); font-weight: 600; flex-shrink: 0; margin-top: 1px; }

/* ── ASSIGNMENT CARD ── */
.assignment-card {
  border: 2px solid var(--session-border); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 16px;
  transition: border-color 0.2s;
}
.assignment-card.open { border-color: var(--session-color); }
.assignment-head {
  padding: 14px 18px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--session-light);
}
.assignment-label-wrap { display: flex; align-items: center; gap: 10px; }
.assignment-badge {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  font-family: monospace; padding: 3px 8px; border-radius: 4px;
  background: var(--session-color); color: white;
}
.assignment-title { font-size: 14px; font-weight: 600; color: var(--text); }
.assignment-body { display: none; padding: 16px 18px; background: var(--surface); }
.assignment-body.open { display: block; }
.assignment-desc { font-size: 14px; line-height: 1.75; color: #333; margin-bottom: 12px; }
.assignment-due {
  font-size: 12px; font-family: monospace; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.assignment-due::before { content: "⏱"; }

/* ── REFERENCES ── */
.refs-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
}
.refs-head {
  padding: 12px 18px; background: var(--bg);
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; border-bottom: 1px solid var(--border);
}
.refs-head-title { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-family: monospace; color: var(--muted); }
.refs-body { display: none; padding: 14px 18px; }
.refs-body.open { display: block; }
.ref-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; color: var(--muted); margin-bottom: 8px; margin-top: 12px; }
.ref-section-label:first-child { margin-top: 0; }
.ref-item { font-size: 13px; line-height: 1.6; color: #333; padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
.ref-item:last-child { border-bottom: none; }
.ref-item-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.ref-item-text {}
.ref-chapter { font-family: monospace; font-size: 11px; color: var(--session-color); margin-top: 2px; }

/* ── NAV ── */
#session-nav { display: flex; justify-content: space-between; margin-top: 32px; gap: 10px; }
.nav-btn {
  padding: 10px 22px; border-radius: 8px; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 600;
  transition: all 0.15s;
}
#btn-prev { border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
#btn-prev:hover:not(:disabled) { background: var(--border); }
#btn-next { border: 1px solid var(--session-color); background: var(--session-color); color: white; }
#btn-next:hover:not(:disabled) { opacity: 0.88; }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── SESSION 7 EXAM SPECIFICS ── */
.exam-banner {
  background: #F0EBFF; border: 1px solid #C9B8F0; border-radius: var(--radius);
  padding: 16px 20px; margin-bottom: 20px; text-align: center;
}
.exam-banner h3 { font-family: 'Lora', serif; font-size: 16px; color: #4A1A9A; margin-bottom: 4px; }
.exam-banner p { font-size: 13px; color: #6B3FAF; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  #topbar-inner { padding: 12px 14px; }
  #topbar-title { font-size: 14px; }
  #shell { padding: 0 14px 48px; }
  #session-header { grid-template-columns: 1fr; }
  #s-icon { display: none; }
  .block-head { grid-template-columns: 60px 80px 1fr auto; gap: 8px; }
  #session-nav { flex-direction: column; }
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-inner">
    <div id="topbar-left">
      <div id="topbar-label">HCI Fundamentals · Student Guide · PROMED 2023 · Semester Genap 2025/2026</div>
      <div id="topbar-title"><strong>Human–Computer Interaction</strong> <span id="topbar-view-label"></span></div>
    </div>
    <div id="topbar-controls">
      <div class="ctrl-group">
        <button class="ctrl-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="ctrl-btn" id="btn-id" onclick="setLang('id')">ID</button>
      </div>
    </div>
  </div>
</div>

<div id="shell">
  <div id="session-tabs"></div>
  <div id="session-header">
    <div>
      <div id="s-meta"></div>
      <div id="s-title"></div>
      <div id="s-subtitle"></div>
      <div id="s-date"></div>
    </div>
    <div id="s-icon"></div>
  </div>
  <div id="session-content"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let LANG = 'en';
let VIEW = 'student'; // fixed
let CUR  = 0;
let openBlocks = {};
let openAssign = false;
let openRubric = false;
let openRefs   = false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const t = (obj) => typeof obj === 'string' ? obj : (obj[LANG] || obj.en);

// ── SESSION DATA ──────────────────────────────────────────────────────────────
const SESSIONS = [
{
  no: 1, icon: "◎",
  date: { en: "April 7, 2026", id: "7 April 2026" },
  color: "#1B7A6E", light: "#E6F5F2", border: "#A8D8D2",
  title: { en: "Introduction to HCI & UX Principles", id: "Pengantar HCI & Prinsip UX" },
  subtitle: { en: "Where it all begins.", id: "Di sinilah semuanya bermula." },
  instructor: {
    prep: {
      en: "Before class: Prepare 5–6 screenshots of good and bad interfaces — local apps (Gojek, Tokopedia, MyBCA) work best because students immediately relate. Open your Miro/FigJam/Padlet template before the session and share the link in chat the moment class starts. Test your screen sharing. Have the apps you want to demo installed and ready.",
      id: "Sebelum kelas: Siapkan 5–6 screenshot UI yang bagus dan yang buruk — aplikasi lokal (Gojek, Tokopedia, MyBCA) paling pas karena mahasiswa langsung relate. Buka template Miro/FigJam/Padlet sebelum sesi dan share link-nya di chat begitu kelas mulai. Test screen sharing dulu. Pastikan aplikasi yang mau di-demo sudah ter-install."
    },
    blocks: [
      {
        time: "0–15", badge: "social", tag: { en: "Opening Ritual", id: "Ritual Pembuka" },
        title: { en: "Social Contract", id: "Kontrak Sosial" },
        body: {
          en: "Open with: 'Before we get into anything, let's set some ground rules together — not mine, ours.' Share the Miro/Padlet link. Students add sticky notes under three columns: Expectations (what they hope to gain), Commitments (what they'll bring to class), and Off-limits (what they want to avoid). Give 8–10 minutes to fill it out, then spend the last 5 minutes reading out and agreeing on key points together. Screenshot and save this — you'll bring it back in Session 7.\n\nFree tools for this: Miro (free tier), FigJam (free), Padlet (free), or Jamboard (Google, free).",
          id: "Buka dengan: 'Sebelum kita mulai, kita tentuin dulu aturan mainnya bareng — bukan aturan gue, tapi aturan kita.' Share link Miro/Padlet. Mahasiswa nulis sticky notes di tiga kolom: Harapan (apa yang ingin mereka dapat), Komitmen (apa yang akan mereka bawa ke kelas), dan Pantangan (apa yang ingin dihindari). Kasih waktu 8–10 menit, lalu 5 menit terakhir baca bareng dan setujui poin-poin utamanya. Screenshot dan simpan — akan dibawa lagi di Sesi 7.\n\nAlternatif gratis: Miro (free tier), FigJam (gratis), Padlet (gratis), atau Jamboard (Google, gratis)."
        },
        why: {
          en: "Students who co-create the classroom norms feel more invested and accountable. It also gives you instant insight into their expectations and anxieties before you've said a word about the syllabus.",
          id: "Mahasiswa yang ikut membuat aturan kelas akan lebih merasa punya dan bertanggung jawab. Ini juga beri insight langsung tentang harapan dan kekhawatiran mereka sebelum kamu sempat bicara soal silabus."
        },
        prompts: []
      },
      {
        time: "15–30", badge: "warmup", tag: { en: "Hook", id: "Kail Pembuka" },
        title: { en: "Interface Analysis — Good vs. Bad", id: "Analisis Antarmuka — Bagus vs. Buruk" },
        body: {
          en: "Show 3 pairs of interfaces side by side: a well-designed app screen vs. a frustrating one. Pick examples from daily life — a clear checkout flow vs. a confusing government form, a simple onboarding vs. a cluttered dashboard. Ask: 'Which one would you rather use? Why?' Let them answer in chat or verbally. Don't explain yet — just collect their observations and plant the question: what makes one better than the other?",
          id: "Tampilkan 3 pasang antarmuka berdampingan: layar aplikasi yang bagus vs. yang frustrasi. Pakai contoh dari kehidupan sehari-hari — alur checkout yang jelas vs. formulir pemerintah yang membingungkan, onboarding sederhana vs. dashboard yang berantakan. Tanya: 'Mana yang lebih enak dipakai? Kenapa?' Biarkan mereka jawab di chat atau langsung. Jangan jelaskan dulu — kumpulkan observasi mereka dan tanam pertanyaan: apa yang bikin satu lebih baik dari yang lain?"
        },
        why: {
          en: "Priming students with a concrete, personal question before theory makes the theory feel like an answer — not a lecture. They'll remember the example, and through it, the concept.",
          id: "Memulai dengan pertanyaan konkret dan personal sebelum teori bikin teorinya terasa seperti jawaban, bukan ceramah. Mereka akan ingat contohnya, dan lewat contoh itu, konsepnya."
        },
        prompts: {
          en: ["Pernah frustrasi sama suatu aplikasi? Ceritain satu kejadian.", "Siapa yang salah kalau user gagal — user-nya atau desainer-nya?"],
          id: ["Pernah frustrasi sama suatu aplikasi? Ceritain satu kejadian.", "Siapa yang salah kalau user gagal — user-nya atau desainer-nya?"]
        }
      },
      {
        time: "30–55", badge: "core", tag: { en: "Core Concept", id: "Konsep Inti" },
        title: { en: "What is HCI, UX, and UI?", id: "Apa itu HCI, UX, dan UI?" },
        body: {
          en: "Cover: the definition of HCI (human + computer + interaction), and — importantly — how HCI, UX, and UI are related but not the same thing. Lots of students come in thinking UX and UI are the same. Use a simple diagram: HCI is the field, UX is the practice, UI is one output of that practice.\n\nThen: a quick timeline — CLI → GUI → Web → Mobile → Touch → Voice → AI. Keep it conversational, not a history exam. Ask them: 'Which era do you live in most?' (Trick answer: all of them.)",
          id: "Bahas: definisi HCI (manusia + komputer + interaksi), dan yang penting — bagaimana HCI, UX, dan UI berkaitan tapi bukan hal yang sama. Banyak mahasiswa datang dengan pikiran UX dan UI itu sama. Pakai diagram sederhana: HCI adalah bidangnya, UX adalah praktiknya, UI adalah salah satu output dari praktik itu.\n\nLalu: timeline singkat — CLI → GUI → Web → Mobile → Touch → Voice → AI. Santai saja, ini bukan ujian sejarah. Tanya: 'Era mana yang paling sering kalian hidup di dalamnya?' (Jawaban trick: semua era.)"
        },
        why: {
          en: "Establishing clear vocabulary early prevents confusion in every subsequent session. The HCI/UX/UI distinction is something students will thank you for clarifying from day one.",
          id: "Membangun kosakata yang jelas di awal mencegah kebingungan di setiap sesi berikutnya. Mahasiswa akan berterima kasih atas klarifikasi HCI/UX/UI dari hari pertama ini."
        },
        prompts: {
          en: ["Can you think of an interface that isn't on a screen? (Car dashboard, ATM, elevator buttons)", "What makes a voice interface different from a touch interface, in terms of how we use it?"],
          id: ["Bisa kasih contoh antarmuka yang bukan di layar? (Dashboard mobil, ATM, tombol lift)", "Apa yang bikin antarmuka suara berbeda dari antarmuka sentuh, dari sisi cara kita pakainya?"]
        }
      },
      {
        time: "55–75", badge: "activity", tag: { en: "Activity", id: "Aktivitas" },
        title: { en: "Comparative Case Study", id: "Studi Kasus Komparatif" },
        body: {
          en: "Students pick one pair of competing products: ride-hailing (Gojek vs. Grab vs. Uber) or e-commerce (Tokopedia vs. Shopee vs. Amazon). Give them 8–10 minutes to open both apps and note 2–3 differences they observe in how the interfaces feel or work. Share findings in chat or verbally. Your job: synthesize their observations using HCI vocabulary. 'What you're noticing about the checkout button placement — that's actually about visibility and affordance.' Let the vocabulary emerge from their observations, not the other way around.",
          id: "Mahasiswa pilih satu pasang produk: ride-hailing (Gojek vs. Grab vs. Uber) atau e-commerce (Tokopedia vs. Shopee vs. Amazon). Kasih waktu 8–10 menit untuk buka kedua aplikasi dan catat 2–3 perbedaan yang mereka amati. Share temuan di chat atau langsung. Tugasmu: rangkum observasi mereka pakai kosakata HCI. 'Yang kalian notice soal posisi tombol checkout — itu sebenernya tentang visibility dan affordance.' Biarkan kosakata muncul dari observasi mereka, bukan sebaliknya."
        },
        why: {
          en: "Starting from what students already know and use makes abstract theory immediately grounded. They become the experts on their own experience, and you become the person who gives that experience a name.",

        body: {
          en: "Show a Norman Door image or video. Ask: 'Who has pushed a door that should be pulled — or vice versa?' (Everyone has.) Ask: 'Whose fault was that?' Let them answer. Then reveal Norman's argument: if the door confuses people consistently, it's a design problem — not a user problem. This is the entire foundation of Norman's work, and it's immediately relatable.",
          id: "Tampilkan gambar atau video Norman Door. Tanya: 'Siapa yang pernah mendorong pintu yang seharusnya ditarik — atau sebaliknya?' (Semua pernah.) Tanya: 'Salah siapa itu?' Biarkan mereka menjawab. Lalu ungkapkan argumen Norman: kalau pintu membingungkan orang secara konsisten, itu masalah desain — bukan masalah pengguna. Ini seluruh fondasi karya Norman, dan langsung relatable."

        prompts: { en: ["Can you think of a digital equivalent of a Norman Door?", "If the user is never wrong — who is responsible when something fails?"], id: ["Bisa kasih contoh digital yang setara dengan Norman Door?", "Kalau user tidak pernah salah — siapa yang bertanggung jawab ketika sesuatu gagal?"] }

        body: {
          en: "Go through all six with a good + bad UI example for each. Spend extra time on Affordances vs. Signifiers — students reliably confuse these.\n\n1. Visibility — users should see what actions are available. Bad: hidden menus, buried settings.\n2. Feedback — the system communicates what just happened. Bad: no confirmation after a form submission.\n3. Constraints — limit what users can do to prevent errors. Good: date pickers that only allow valid dates.\n4. Mapping — logical relationship between controls and effects. Bad: volume slider going the wrong direction.\n5. Consistency — same elements behave the same way throughout. Bad: different swipe gestures in different parts of the same app.\n6. Affordances & Signifiers — does it look like what it does? A button should look tappable.\n\nAfter each principle, ask: 'Kasih satu contoh dari app yang kalian pakai sehari-hari.'",
          id: "Bahas semua enam dengan contoh UI bagus + buruk untuk masing-masing. Habiskan waktu ekstra untuk Affordances vs. Signifiers — mahasiswa sering membingungkan ini.\n\n1. Visibility — pengguna harus bisa melihat aksi yang tersedia. Buruk: menu tersembunyi, pengaturan yang terpendam.\n2. Feedback — sistem mengkomunikasikan apa yang baru terjadi. Buruk: tidak ada konfirmasi setelah pengiriman formulir.\n3. Constraints — batasi apa yang bisa dilakukan pengguna untuk mencegah kesalahan. Baik: date picker yang hanya memperbolehkan tanggal valid.\n4. Mapping — hubungan logis antara kontrol dan efek. Buruk: slider volume yang bergerak ke arah yang salah.\n5. Consistency — elemen yang sama berperilaku sama di mana-mana. Buruk: gesture swipe yang berbeda di bagian berbeda dari aplikasi yang sama.\n6. Affordances & Signifiers — apakah tampilannya mencerminkan fungsinya? Tombol harus terlihat bisa ditekan.\n\nSetelah setiap prinsip, tanya: 'Kasih satu contoh dari app yang kalian pakai sehari-hari.'"
        },
        why: { en: "Going one-by-one with examples from the students' own apps turns an abstract framework into something they can apply immediately — and makes the audit exercise that follows much more productive.", id: "Satu per satu dengan contoh dari aplikasi mahasiswa sendiri mengubah framework abstrak menjadi sesuatu yang langsung bisa diterapkan — dan membuat latihan audit berikutnya jauh lebih produktif." },
        prompts: {
          en: ["Which of these 6 principles do you think is most commonly violated? Why?", "Can a principle be 'too much'? E.g., too many constraints?"],

    prep: {
      en: "IMPORTANT: Send a reminder 2–3 days before class for students to set up their Figma or Penpot accounts — don't lose 15 minutes of class time on account creation. Prepare a simple wireframe starter template (3 blank screens in Figma/Penpot). Have examples of the lo-fi → hi-fi progression for the same screen. Brief yourself on WCAG minimum touch targets (44px) and contrast ratios (4.5:1 for normal text).",
      id: "PENTING: Kirim pengingat 2–3 hari sebelum kelas agar mahasiswa menyiapkan akun Figma atau Penpot — jangan buang 15 menit waktu kelas untuk pembuatan akun. Siapkan template starter wireframe sederhana (3 layar kosong di Figma/Penpot). Siapin contoh progres lo-fi → hi-fi untuk layar yang sama. Refresh diri tentang ukuran sentuh minimum WCAG (44px) dan rasio kontras (4.5:1 untuk teks normal)."
    },
    blocks: [
      {
        time: "0–10", badge: "warmup", tag: { en: "Warm-up", id: "Pemanasan" },
        title: { en: "Paper Sketch → Lo-fi → Hi-fi", id: "Sketsa Kertas → Lo-fi → Hi-fi" },
        body: {
          en: "Show a side-by-side comparison of the same screen in three states: a rough paper sketch, a lo-fi wireframe (greyscale, no branding), and a hi-fi prototype (colours, typography, interactions). Ask: 'At which stage would you want to receive feedback?' Let them discuss. Then reveal the design principle: earlier feedback is cheaper. A lo-fi prototype takes 20 minutes to change; a hi-fi one takes 2 days.",
          id: "Tunjukkan perbandingan berdampingan dari layar yang sama dalam tiga keadaan: sketsa kertas kasar, wireframe lo-fi (greyscale, tanpa branding), dan prototipe hi-fi (warna, tipografi, interaksi). Tanya: 'Pada tahap mana kamu ingin menerima umpan balik?' Biarkan mereka berdiskusi. Lalu ungkapkan prinsip desain: umpan balik lebih awal lebih murah. Prototipe lo-fi butuh 20 menit untuk diubah; yang hi-fi butuh 2 hari."
        },
        why: { en: "Starting with the fidelity spectrum helps students understand why they're sketching first instead of jumping into Figma — it's a deliberate strategy, not a limitation.", id: "Mulai dengan spektrum fidelitas membantu mahasiswa memahami mengapa mereka sketsa dulu sebelum langsung ke Figma — ini strategi yang disengaja, bukan keterbatasan." },
        prompts: { en: ["Why might a team skip lo-fi and go straight to hi-fi? What's the risk?", "What kind of feedback can you NOT get from a lo-fi prototype?"], id: ["Kenapa sebuah tim mungkin melewati lo-fi dan langsung ke hi-fi? Apa risikonya?", "Jenis umpan balik apa yang TIDAK bisa kamu dapatkan dari prototipe lo-fi?"] }
      },
      {
        time: "10–30", badge: "core", tag: { en: "Tools", id: "Alat" },
        title: { en: "Wireframing Tools Overview", id: "Gambaran Alat Wireframing" },
        body: {
          en: "Quick tour: Figma (most widely used, free tier available, cloud-based), Penpot (open-source alternative, very similar to Figma, fully free), Balsamiq (lo-fi specialist, great for quick sketching). Design systems basics: grids, 8px spacing systems, component libraries. Show how a consistent grid makes layouts feel intentional even at lo-fi stage.\n\nIf students are new to Figma/Penpot, spend 5 minutes on the absolute basics: frames, shapes, text, grouping.",
          id: "Tur singkat: Figma (paling banyak digunakan, tersedia free tier, berbasis cloud), Penpot (alternatif open-source, sangat mirip Figma, sepenuhnya gratis), Balsamiq (spesialis lo-fi, bagus untuk sketsa cepat). Dasar-dasar design system: grid, sistem spasi 8px, component library. Tunjukkan bagaimana grid yang konsisten membuat tata letak terasa disengaja bahkan di tahap lo-fi.\n\nJika mahasiswa baru mengenal Figma/Penpot, habiskan 5 menit untuk dasar-dasar mutlak: frame, shape, teks, pengelompokan."
        },
        why: { en: "Showing free alternatives alongside Figma early removes the financial barrier and signals that the skill is tool-agnostic — the thinking matters more than the tool.", id: "Menampilkan alternatif gratis bersama Figma sejak awal menghilangkan hambatan finansial dan memberi sinyal bahwa keterampilan ini tidak bergantung pada alat — cara berpikirnya lebih penting dari alatnya." },
        prompts: { en: [], id: [] }
      },
      {
        time: "30–65", badge: "activity", tag: { en: "Workshop", id: "Workshop" },
        title: { en: "Wireframe Sketching Workshop", id: "Workshop Sketsa Wireframe" },
        body: {
          en: "Students wireframe 3 screens for a product of their choice (they can build on their user flow from Session 4). Start on paper or in a lo-fi tool first — boxes, lines, no colour. The rule: if you can't explain why each element is there, it shouldn't be there.\n\nAfter 25 minutes of sketching: pick the best screen and make it clickable. Add interactive links between screens. 10 minutes. The goal isn't a polished prototype — it's a prototype that communicates the flow.",
          id: "Mahasiswa wireframe 3 layar untuk produk pilihan mereka (bisa melanjutkan user flow dari Sesi 4). Mulai di kertas atau alat lo-fi dulu — kotak, garis, tanpa warna. Aturannya: kalau kamu tidak bisa menjelaskan kenapa setiap elemen ada di sana, elemen itu tidak perlu ada.\n\nSetelah 25 menit sketsa: pilih layar terbaik dan jadikan bisa diklik. Tambahkan tautan interaktif antar layar. 10 menit. Tujuannya bukan prototipe yang sempurna — tapi prototipe yang mengkomunikasikan alurnya."
        },
        why: { en: "Starting on paper (even digitally) before going hi-fi builds the habit of thinking before styling — one of the most important professional habits a designer can develop.", id: "Mulai di kertas (bahkan secara digital) sebelum ke hi-fi membangun kebiasaan berpikir sebelum menata gaya — salah satu kebiasaan profesional terpenting yang bisa dikembangkan seorang desainer." },
        prompts: { en: [], id: [] }
      },
      {
        time: "65–80", badge: "activity", tag: { en: "Peer Feedback", id: "Umpan Balik Rekan" },
        title: { en: "Structured Peer Feedback", id: "Umpan Balik Rekan Terstruktur" },
        body: {
          en: "Pairs exchange prototypes. Feedback format — give students this exact structure:\n• 'One thing that is clear: ...'\n• 'One thing that confused me: ...'\n• 'One suggestion: ...'\n\n10 minutes per person. This structure prevents both empty praise ('it's great!') and unconstructive criticism ('I don't like it'). It's also a professional feedback model they'll use in their careers.",
          id: "Pasangan bertukar prototipe. Format umpan balik — berikan struktur persis ini kepada mahasiswa:\n• 'Satu hal yang jelas: ...'\n• 'Satu hal yang membingungkanku: ...'\n• 'Satu saran: ...'\n\n10 menit per orang. Struktur ini mencegah pujian kosong ('bagus!') dan kritik yang tidak konstruktif ('aku tidak suka'). Ini juga model umpan balik profesional yang akan mereka gunakan dalam karir."
        },
        why: { en: "Structured feedback teaches both giving and receiving critique — a skill many students have never practiced formally. The format makes it safe to be honest.", id: "Umpan balik terstruktur mengajarkan cara memberi dan menerima kritik — keterampilan yang belum pernah dipraktikkan secara formal oleh banyak mahasiswa. Formatnya membuat jujur terasa aman." },
        prompts: { en: [], id: [] }
      },
      {
        time: "80–95", badge: "core", tag: { en: "Accessibility by Design", id: "Aksesibilitas sejak Awal" },
        title: { en: "WCAG Basics at the Wireframe Stage", id: "Dasar WCAG di Tahap Wireframe" },
        body: {
          en: "Three things students can check at wireframe stage:\n1. Touch target size — minimum 44×44px for interactive elements. Show what too-small targets look like.\n2. Colour contrast — minimum 4.5:1 ratio for body text. Even in greyscale wireframes, you can plan for this.\n3. Text hierarchy — never rely on colour alone to communicate meaning. If colour was removed, would the hierarchy still be clear?\n\nKey message: 'Accessibility isn't a post-production checklist — it's a design decision you make from the first sketch.'",
          id: "Tiga hal yang bisa mahasiswa cek di tahap wireframe:\n1. Ukuran target sentuh — minimum 44×44px untuk elemen interaktif. Tunjukkan seperti apa target yang terlalu kecil.\n2. Kontras warna — rasio minimum 4.5:1 untuk teks isi. Bahkan dalam wireframe greyscale, kamu bisa merencanakan ini.\n3. Hierarki teks — jangan pernah hanya mengandalkan warna untuk mengkomunikasikan makna. Kalau warna dihapus, apakah hierarkinya masih jelas?\n\nPesan kunci: 'Aksesibilitas bukan checklist pasca-produksi — ini keputusan desain yang dibuat sejak sketsa pertama.'"
        },
        why: { en: "Introducing WCAG at the wireframe stage (rather than as a separate 'accessibility session') shows students it's an integrated design practice, not a compliance afterthought.", id: "Memperkenalkan WCAG di tahap wireframe (bukan sebagai 'sesi aksesibilitas' terpisah) menunjukkan kepada mahasiswa bahwa ini adalah praktik desain terintegrasi, bukan pemikiran kepatuhan setelahnya." },
        prompts: { en: ["What other aspects of accessibility could you plan for at wireframe stage?", "Why do you think accessibility is often left until the end of a project?"], id: ["Aspek aksesibilitas lain apa yang bisa kamu rencanakan di tahap wireframe?", "Kenapa menurutmu aksesibilitas sering ditinggalkan hingga akhir proyek?"] }
      },
      {
        time: "95–100", badge: "closing", tag: { en: "Wrap-up", id: "Penutup" },
        title: { en: "Assignment Brief", id: "Pengantar Tugas" },
        body: { en: "Key tip: 'Submit a share link, not a screenshot. We need to click through it.' Also remind: the prototype doesn't need to be hi-fi — a working lo-fi prototype is more valuable than a beautiful static mockup.", id: "Tip kunci: 'Submit link berbagi, bukan screenshot. Kita perlu mengklik melaluinya.' Juga ingatkan: prototipe tidak perlu hi-fi — prototipe lo-fi yang berfungsi lebih berharga dari mockup statis yang indah." },
        why: { en: "", id: "" }, prompts: { en: [], id: [] }
      }
    ],
    rubric: {

        { criterion: { en: "Task clarity", id: "Kejelasan tugas" }, desc: { en: "The user task is clear and the flow supports it logically", id: "Tugas pengguna jelas dan alurnya mendukungnya secara logis" }, points: "35%" },
        { criterion: { en: "Accessibility note", id: "Catatan aksesibilitas" }, desc: { en: "One accessibility decision is documented and justified", id: "Satu keputusan aksesibilitas didokumentasikan dan dibenarkan" }, points: "20%" },
        { criterion: { en: "Thoughtfulness", id: "Ketelitian" }, desc: { en: "Evidence of Norman's principles in the layout choices", id: "Bukti prinsip Norman dalam pilihan tata letak" }, points: "20%" },
      ]
    }

{
  no: 6, icon: "◐",
  date: { en: "May 12, 2026", id: "12 Mei 2026" },
  color: "#B5341E", light: "#FDEEE9", border: "#ECA898",
  title: { en: "Usability Testing & Evaluation", id: "Pengujian Usabilitas & Evaluasi" },
  subtitle: { en: "You think it works. Let's find out.", id: "Kamu pikir ini berhasil. Mari kita cari tahu." },
  instructor: {
    prep: {
      en: "Prepare a simplified usability test script (5 tasks, max 2 sentences each). Print or share Nielsen's 10 heuristics as a reference card before class. Have a simple observation note template ready. Remind students to bring their prototypes from Session 5 — these will be tested today. Plan for the presentation teaser at the end: give students a heads-up on what's expected in Session 7.",
      id: "Siapkan skrip tes usabilitas yang disederhanakan (5 tugas, maksimal 2 kalimat masing-masing). Cetak atau bagikan 10 heuristik Nielsen sebagai kartu referensi sebelum kelas. Siapin template catatan observasi sederhana. Ingatkan mahasiswa untuk membawa prototipe dari Sesi 5 — ini yang akan diuji hari ini. Rencanakan teaser presentasi di akhir: beri mahasiswa gambaran apa yang diharapkan di Sesi 7."
    },
    blocks: [
      {
        time: "0–10", badge: "warmup", tag: { en: "Warm-up", id: "Pemanasan" },
        title: { en: "The Humbling Moment", id: "Momen yang Merendahkan Hati" },
        body: {
          en: "'From your prototypes last week — what do you think works really well? What are you unsure about?' 2–3 students share. Then: 'The only way to actually know is to watch someone else use it. Not a friend who's being polite — someone who will struggle with it openly.' Bridge to why usability testing exists.",
          id: "'Dari prototipe kalian minggu lalu — apa yang menurut kalian berhasil dengan baik? Apa yang kalian tidak yakin?' 2–3 mahasiswa berbagi. Lalu: 'Satu-satunya cara untuk benar-benar tahu adalah dengan menonton orang lain menggunakannya. Bukan teman yang sedang bersikap sopan — seseorang yang akan berjuang dengan terbuka.' Bridge ke mengapa pengujian usabilitas ada."
        },
        why: { en: "Starting from their own prototypes creates immediate personal stake — they want to know if their work works.", id: "Mulai dari prototipe mereka sendiri menciptakan kepentingan pribadi yang langsung — mereka ingin tahu apakah pekerjaan mereka berhasil." },
        prompts: { en: [], id: [] }
      },
      {
        time: "10–35", badge: "core", tag: { en: "Core Concept", id: "Konsep Inti" },
        title: { en: "How Usability Testing Works", id: "Bagaimana Pengujian Usabilitas Bekerja" },
        body: {
          en: "Cover: the think-aloud method (users narrate what they're doing and thinking while performing tasks), task design principles (observable, specific, not leading: 'Find and purchase a medium blue hoodie' not 'Find the hoodie you want to buy'), the facilitator's role (don't help, don't react, ask 'what are you thinking right now?' when silent), and note-taking strategy.\n\nKey Nielsen finding to share: 5 users find approximately 85% of usability problems. You don't need 100 participants.",
          id: "Bahas: metode think-aloud (pengguna menceritakan apa yang mereka lakukan dan pikirkan saat melakukan tugas), prinsip desain tugas (bisa diamati, spesifik, tidak mengarahkan: 'Temukan dan beli hoodie biru medium' bukan 'Temukan hoodie yang ingin kamu beli'), peran fasilitator (jangan bantu, jangan bereaksi, tanya 'apa yang kamu pikirkan sekarang?' saat diam), dan strategi pencatatan.\n\nTemuan Nielsen kunci untuk dibagikan: 5 pengguna menemukan sekitar 85% masalah usabilitas. Kamu tidak butuh 100 peserta."
        },
        why: { en: "The '5 users' finding is motivating — it makes usability testing feel achievable, not like a massive research project.", id: "Temuan '5 pengguna' itu memotivasi — membuat pengujian usabilitas terasa bisa dicapai, bukan seperti proyek riset besar." },
        prompts: {
          en: ["What's hardest about watching someone struggle with your design without helping them?", "What's the difference between 'they don't understand' and 'I didn't explain it clearly enough'?"],
          id: ["Apa yang paling susah dari menonton seseorang berjuang dengan desainmu tanpa membantunya?", "Apa bedanya 'mereka tidak mengerti' dan 'aku tidak menjelaskannya dengan cukup jelas'?"]
        }
      },
      {
        time: "35–60", badge: "activity", tag: { en: "Live Activity", id: "Aktivitas Langsung" },
        title: { en: "Peer Usability Testing", id: "Pengujian Usabilitas Antar Rekan" },
        body: {
          en: "Students test each other's prototypes from Session 5. Tester thinks aloud while performing 2 assigned tasks. Observer takes notes using the template: step, what happened, what user said, what user did. 15 minutes each way. After: each student lists their top 3 usability issues found, rated by severity (1 = minor, 2 = moderate, 3 = critical).",
          id: "Mahasiswa menguji prototipe satu sama lain dari Sesi 5. Penguji berpikir keras sambil melakukan 2 tugas yang ditentukan. Pengamat mengambil catatan menggunakan template: langkah, apa yang terjadi, apa yang dikatakan pengguna, apa yang dilakukan pengguna. 15 menit untuk masing-masing. Setelah itu: setiap mahasiswa mendaftar 3 masalah usabilitas teratas yang ditemukan, dinilai berdasarkan tingkat keparahan (1 = minor, 2 = sedang, 3 = kritis)."
        },
        why: { en: "Testing a peer's work (not your own) removes ego from the equation and creates a safe environment for honest feedback. The structured template ensures everyone records comparable data.", id: "Menguji pekerjaan rekan (bukan milikmu sendiri) menghilangkan ego dari persamaan dan menciptakan lingkungan yang aman untuk umpan balik yang jujur. Template terstruktur memastikan semua orang mencatat data yang sebanding." },
        prompts: { en: [], id: [] }
      },
      {
        time: "60–80", badge: "core", tag: { en: "Framework", id: "Kerangka" },
        title: { en: "Heuristic Evaluation — Nielsen's 10 Principles", id: "Evaluasi Heuristik — 10 Prinsip Nielsen" },
        body: {
          en: "Walk through all 10 heuristics with one clear example each:\n1. Visibility of system status\n2. Match between system and real world\n3. User control and freedom (undo/redo)\n4. Consistency and standards\n5. Error prevention\n6. Recognition rather than recall\n7. Flexibility and efficiency of use\n8. Aesthetic and minimalist design\n9. Help users recognise, diagnose and recover from errors\n10. Help and documentation\n\nNote: these connect directly to Norman's principles from Session 4 — show the overlap. Students apply heuristics to one screen from their prototype: find 2 violations, propose a fix for each.",
          id: "Bahas semua 10 heuristik dengan satu contoh jelas masing-masing:\n1. Visibility of system status\n2. Match between system and real world\n3. User control and freedom (undo/redo)\n4. Consistency and standards\n5. Error prevention\n6. Recognition rather than recall\n7. Flexibility and efficiency of use\n8. Aesthetic and minimalist design\n9. Help users recognise, diagnose and recover from errors\n10. Help and documentation\n\nCatatan: ini terhubung langsung ke prinsip Norman dari Sesi 4 — tunjukkan tumpang tindihnya. Mahasiswa menerapkan heuristik ke satu layar dari prototipe mereka: temukan 2 pelanggaran, usulkan perbaikan untuk masing-masing."
        },
        why: { en: "Connecting Nielsen's heuristics back to Norman's principles from Session 4 shows students that HCI isn't a collection of unrelated rules — it's a coherent framework built by people thinking about the same problem from different angles.", id: "Menghubungkan heuristik Nielsen kembali ke prinsip Norman dari Sesi 4 menunjukkan kepada mahasiswa bahwa HCI bukan kumpulan aturan yang tidak terkait — ini adalah kerangka yang koheren yang dibangun oleh orang-orang yang memikirkan masalah yang sama dari sudut yang berbeda." },
        prompts: {
          en: ["Which of the 10 heuristics do you think is hardest to evaluate? Why?", "Can a heuristic ever conflict with another heuristic?"],
          id: ["Dari 10 heuristik ini, mana yang menurut kalian paling susah dievaluasi? Kenapa?", "Bisakah sebuah heuristik bertentangan dengan heuristik lain?"]
        }
      },
      {
        time: "80–95", badge: "core", tag: { en: "Metrics + Future", id: "Metrik + Masa Depan" },
        title: { en: "Usability Metrics & Emerging Interfaces", id: "Metrik Usabilitas & Antarmuka Masa Depan" },
        body: {
          en: "Quick overview of usability metrics: task completion rate, time on task, error rate, satisfaction scores (SUS - System Usability Scale). How to report findings to a team that may resist criticism: frame as opportunities, not failures.\n\nBrief closing discussion on emerging interfaces: how does usability testing change for an AI chat interface? For a voice assistant? For an AR overlay? (There are no right answers — but thinking about this prepares students for how the field evolves.) Connect back to Session 1's teaser about the future of HCI.",
          id: "Gambaran singkat metrik usabilitas: tingkat penyelesaian tugas, waktu untuk tugas, tingkat kesalahan, skor kepuasan (SUS - System Usability Scale). Cara melaporkan temuan ke tim yang mungkin menolak kritik: frame sebagai peluang, bukan kegagalan.\n\nDiskusi penutup singkat tentang antarmuka masa depan: bagaimana pengujian usabilitas berubah untuk antarmuka AI chat? Untuk voice assistant? Untuk AR overlay? (Tidak ada jawaban yang benar — tapi memikirkan hal ini mempersiapkan mahasiswa untuk bagaimana bidang ini berkembang.) Hubungkan kembali ke teaser Sesi 1 tentang masa depan HCI."
        },
        why: { en: "Closing the session by connecting back to Session 1 ('we said HCI was moving toward AI and AR — now you understand why evaluating those is genuinely complex') creates a satisfying arc and reinforces the course's coherence.", id: "Menutup sesi dengan menghubungkan kembali ke Sesi 1 ('kita bilang HCI bergerak menuju AI dan AR — sekarang kalian mengerti kenapa mengevaluasi itu benar-benar kompleks') menciptakan arc yang memuaskan dan memperkuat koherensi kursus." },
        prompts: {
          en: ["Kalau lo mau tes usabilitas sebuah AI chatbot, task apa yang bakal lo kasih ke user?", "What would 'error rate' mean for a voice interface?"],
          id: ["Kalau lo mau tes usabilitas sebuah AI chatbot, task apa yang bakal lo kasih ke user?", "Apa arti 'tingkat kesalahan' untuk antarmuka suara?"]
        }

      {

        title: { en: "Assignment Brief & Session 7 Preview", id: "Pengantar Tugas & Preview Sesi 7" },
        body: { en: "Walk through the usability testing report assignment. Then: preview Session 7. 'In two weeks, you'll present your complete UX project. It should connect everything: your research, your design decisions, your testing findings. Start thinking about how these all tell one story.' Remind them of the social contract from Session 1 — you'll bring it back to close the course.", id: "Jelaskan tugas laporan pengujian usabilitas. Kemudian: preview Sesi 7. 'Dua minggu lagi, kalian akan mempresentasikan proyek UX lengkap kalian. Ini harus menghubungkan semuanya: riset kalian, keputusan desain kalian, temuan pengujian kalian. Mulai pikirkan bagaimana semua ini menceritakan satu cerita.' Ingatkan mereka tentang kontrak sosial dari Sesi 1 — kamu akan membawanya kembali untuk menutup kursus." },

function applySessionColor(s) {
  document.documentElement.style.setProperty('--session-color', s.color);
  document.documentElement.style.setProperty('--session-light', s.light);
  document.documentElement.style.setProperty('--session-border', s.border);
}

function renderTabs() {
  const s = SESSIONS[CUR];
  document.getElementById('session-tabs').innerHTML = SESSIONS.map((sess, i) => `
    <button class="s-tab ${i === CUR ? 'active' : ''} ${sess.isExam ? 'exam' : ''}"
            onclick="goTo(${i})">
      S${sess.no}${sess.isExam ? ' ★' : ''}
    </button>
  `).join('');
}

function renderHeader() {
  const s = SESSIONS[CUR];
  document.getElementById('s-meta').textContent = `${t({en:'SESSION',id:'SESI'})} ${s.no} ${t({en:'OF',id:'DARI'})} 7 · 100 MIN`;
  document.getElementById('s-meta').style.color = s.color;
  document.getElementById('s-title').textContent = t(s.title);
  document.getElementById('s-subtitle').textContent = t(s.subtitle);
  document.getElementById('s-date').textContent = t(s.date);
  document.getElementById('s-icon').textContent = s.icon;
  document.getElementById('s-icon').style.color = s.color;
  const hdr = document.getElementById('session-header');
  hdr.style.background = s.light;
  hdr.style.borderColor = s.border;
  document.getElementById('topbar-view-label').textContent =
    VIEW === 'instructor' ? t({en:'Instructor Guide',id:'Panduan Instruktur'}) : t({en:'Student Guide',id:'Panduan Mahasiswa'});
}

function renderInstructor() {
  const s = SESSIONS[CUR];
  const d = s.instructor;
  let html = '';

  // Prep card
  html += `<div class="section-label">${t({en:'PREPARATION',id:'PERSIAPAN'})}</div>`;
  html += `<div class="prep-card">
    <div class="prep-card-label">📋 ${t({en:'Before Class',id:'Sebelum Kelas'})}</div>

  html += `<div class="block-wrap">`;
  d.blocks.forEach((b, i) => {
    const key = `${CUR}-${i}`;
    const isOpen = !!openBlocks[key];
    const prompts = Array.isArray(b.prompts) ? b.prompts : t(b.prompts) || [];
    html += `
    <div class="block ${isOpen ? 'open' : ''}" id="block-${key}">

        <span class="block-chev ${isOpen ? 'open' : ''}">›</span>
      </div>
      <div class="block-body ${isOpen ? 'open' : ''}">
        <p>${t(b.body).replace(/\n/g,'<br><br>')}</p>

        </div>` : ''}
      </div>

    html += `<div class="section-label">${t({en:'ASSIGNMENT RUBRIC',id:'RUBRIK TUGAS'})}</div>`;

          ${d.rubric.rows.map(r => `<tr>

        <div class="ref-item">
          <span class="ref-item-icon">📖</span>

function renderContent() {
  const s = SESSIONS[CUR];

  renderTabs();
  renderHeader();

  let inner = '';
  if (s.isExam) {
    inner += `<div class="exam-banner">
      <h3>★ ${t({en:'Final Exam Session',id:'Sesi Ujian Akhir'})}</h3>
      <p>${t({en:'Presentations — no new material delivered today',id:'Presentasi — tidak ada materi baru hari ini'})}</p>
    </div>`;
  }

  if (VIEW === 'instructor') {
    inner += renderInstructor();
  } else {
    inner += renderStudent();
  }

  // Nav
  inner += `<div id="session-nav">
    <button class="nav-btn" id="btn-prev" onclick="changeSession(-1)" ${CUR===0?'disabled':''}>← ${t({en:'Previous',id:'Sebelumnya'})}</button>

  </div>`;

  document.getElementById('session-content').innerHTML = inner;
}

}
function toggleRefs() {
  openRefs = !openRefs;
  renderContent();
}

function goTo(i) {
  CUR = i;
  openBlocks = {};
  openAssign = false;
  openRubric = false;
  openRefs = false;
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function changeSession(dir) {
  const n = CUR + dir;
  if (n < 0 || n >= SESSIONS.length) return;
  goTo(n);
}

// setView removed — student-only version

function setLang(l) {
  LANG = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-id').classList.toggle('active', l === 'id');
  renderContent();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderContent();
</script>
